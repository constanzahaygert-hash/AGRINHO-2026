<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="AGRINHO — energia solar e solo fértil gerados por IA">
  <defs>
    <linearGradient id="g2" x1="0" x2="1">
      <stop offset="0" stop-color="#6D4C41"/>
      <stop offset="1" stop-color="#2E7D32"/>
    </linearGradient>
    <style>
      .bg { fill: #FFFFFF; }
      .panel { fill: #E8F5E9; }
      .title { font-family: Poppins, Arial, sans-serif; font-weight:700; fill:#263238; }
      .sub { font-family: Open Sans, Arial, sans-serif; fill:#546E7A; font-size:16px; }
      .solar { fill:#FFD54F; }
      .panel2 { fill:url(#g2); opacity:0.08; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="800" rx="16"/>
  <rect x="60" y="120" width="1080" height="560" rx="14" class="panel"/>
  <g transform="translate(100,160)">
    <!-- solar array blocks -->
    <g transform="translate(0,20)">
      <rect x="0" y="0" width="980" height="120" rx="8" fill="#B3E5FC"/>
      <g fill="#2196F3" opacity="0.85">
        <rect x="12" y="14" width="90" height="90" rx="6"/>
        <rect x="114" y="14" width="90" height="90" rx="6"/>
        <rect x="216" y="14" width="90" height="90" rx="6"/>
        <rect x="318" y="14" width="90" height="90" rx="6"/>
        <rect x="420" y="14" width="90" height="90" rx="6"/>
        <rect x="522" y="14" width="90" height="90" rx="6"/>
      </g>
    </g>

    <!-- soil and plant -->
    <g transform="translate(0,180)">
      <rect x="0" y="0" width="980" height="200" rx="10" fill="#4CAF50" opacity="0.12"/>
      <g transform="translate(60,40)" fill="#2E7D32">
        <path d="M10 80 C40 0, 140 0, 220 70 C300 140, 420 40, 560 20 C700 0, 820 90, 920 80 L920 120 L10 120 Z"/>
      </g>
    </g>

    <!-- overlay mark -->
    <rect x="860" y="-40" width="200" height="80" rx="12" class="panel2"/>
    <text x="880" y="-2" class="title" font-size="24">AGRINHO</text>
    <text x="880" y="28" class="sub">Energia limpa • Solo fértil</text>
  </g>
</svg>
